<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wafiq's Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <div class="space-stars" aria-hidden="true"></div>

  <nav class="navbar navbar-expand-lg border-bottom sticky-top cosmic-nav">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">Wafiq's Postulations</a>

      <div class="dropdown ms-auto">
        <button class="btn btn-outline-info dropdown-toggle rounded-pill px-3" type="button" data-bs-toggle="dropdown"
          aria-expanded="false">
          Account Profile
        </button>
        <ul class="dropdown-menu dropdown-menu-end shadow-sm">
          <li><a class="dropdown-item" href="#">Settings</a></li>
          <li>
            <hr class="dropdown-divider">
          </li>
          <li><a class="dropdown-item text-danger fw-semibold" href="#">LOGOUT</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-4 position-relative">
    <div class="feed-shell">
      <header class="mb-4">
        <h1 class="h3 fw-bold mb-1">Home</h1>
        <p class="feed-subtitle mb-0">Latest thoughts, updates, and stories from McMaster's brightest mind.</p>
      </header>


      <section class="tweet-card p-3 p-md-4 mb-3 reveal-on-load">
        <div class="d-flex gap-3">
          <div class="avatar-dot bg-dark">DM</div>
          <div class="w-100">
            <div class="d-flex flex-wrap align-items-center gap-2 mb-1">
              <strong>DEMO TITLE</strong>
              <span class="text-secondary">@DemoPost</span>
              <span class="text-secondary">&middot;</span>
              <span class="text-secondary">TIME SINCE POST</span>
            </div>
            <p class="mb-2 text-secondary">
              Bodytext for a post.
            </p>
            <div class="d-flex gap-3 text-secondary small">
              <span>Reply</span>
              <span>Repost</span>
              <span>Like</span>
              <span>Share</span>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
  <script src="js/index.js"></script>
</body>

</html>

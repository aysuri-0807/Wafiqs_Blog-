<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post | Wafiq's Blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="space-stars" aria-hidden="true"></div>

    <nav class="navbar navbar-expand-lg border-bottom sticky-top cosmic-nav">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Wafiq's Postulations</a>
            <a class="btn btn-outline-info rounded-pill px-3 ms-auto" href="index.html">Back To Home</a>
        </div>
    </nav>

    <main class="container py-4 position-relative">
        <div class="compose-shell">
            <header class="mb-4">
                <h1 class="h3 fw-bold mb-1">Create Post</h1>
                <p class="feed-subtitle mb-0">Only users with the required role are allowed to publish.</p>
            </header>

            <section class="compose-card p-3 p-md-4 reveal-on-load">
                <form id="create-post-form" novalidate>
                    <div class="mb-3">
                        <label class="compose-label" for="user-id">User ID</label>
                        <input id="user-id" class="compose-input" type="number" min="1" placeholder="Enter your user ID"
                            required>
                        <small class="feed-subtitle">Temporary auth placeholder until login session wiring is
                            added.</small>
                    </div>

                    <div class="mb-3">
                        <label class="compose-label" for="post-title">Title</label>
                        <input id="post-title" class="compose-input" type="text" maxlength="140"
                            placeholder="Post title" required>
                    </div>

                    <div class="mb-3">
                        <label class="compose-label" for="post-content">Content</label>
                        <textarea id="post-content" class="compose-textarea" maxlength="5000"
                            placeholder="What is happening?" required></textarea>
                    </div>

                    <div class="d-flex flex-wrap align-items-center gap-3">
                        <button class="btn btn-info rounded-pill px-4 fw-semibold" type="submit">Publish</button>
                        <div id="create-status" class="compose-status" aria-live="polite"></div>
                    </div>
                </form>
            </section>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="js/create-post.js"></script>
</body>

</html>

      <div class="compose-shell">
        <header class="mb-4">
          <h1 class="h3 fw-bold mb-1">Create Comment</h1>
          <p class="feed-subtitle mb-0">You must be logged in to comment.</p>
        </header>

        <section class="compose-card p-3 p-md-4 reveal-on-load">
          <form id="create-comment-form" novalidate>
            <div class="mb-3">
              <label class="compose-label" for="comment-content">Comment</label>
              <textarea
                id="comment-content"
                class="compose-textarea"
                maxlength="1000"
                placeholder="Write your comment here..."
                required
              ></textarea>
            </div>

            <div class="d-flex flex-wrap align-items-center gap-3">
              <button
                class="btn btn-info rounded-pill px-4 fw-semibold"
                type="submit"
              >
                Post Comment
              </button>
              <div
                id="comment-status"
                class="compose-status"
                aria-live="polite"
              ></div>
            </div>
          </form>
        </section>
      </div>

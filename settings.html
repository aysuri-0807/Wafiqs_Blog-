<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings | Wafiq's Blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="space-stars" aria-hidden="true"></div>
    <div class="space-sparkles" aria-hidden="true"></div>
    <div class="space-orbits" aria-hidden="true">
      <span class="planet planet-primary"></span>
      <span class="planet planet-secondary"></span>
      <span class="planet planet-tertiary"></span>
    </div>

    <nav class="navbar navbar-expand-lg border-bottom sticky-top cosmic-nav">
      <div class="container-fluid px-4 px-lg-5">
        <a class="navbar-brand fw-bold" href="index.html">Wafiq's Postulations</a>

        <div class="ms-auto d-flex align-items-center gap-2">
          <a id="login-link-wrapper" href="login.php" class="d-none">
            <button id="login-link-button" class="btn btn-outline-info rounded-pill px-3" type="button">Login</button>
          </a>

          <div id="account-dropdown" class="dropdown d-none">
            <button id="account-menu-button" class="btn btn-outline-info dropdown-toggle rounded-pill px-3" type="button"
              data-bs-toggle="dropdown" aria-expanded="false">
              Account
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow-sm">
              <li><a id="my-profile-link" class="dropdown-item d-none" href="#">My Profile</a></li>
              <li><a class="dropdown-item" href="settings.html">Settings</a></li>
              <li>
                <hr class="dropdown-divider" />
              </li>
              <li>
                <a id="logout-link" class="dropdown-item text-danger fw-semibold" href="#">LOGOUT</a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </nav>

    <main class="container py-4 position-relative">
      <div class="compose-shell">
        <header class="mb-4">
          <h1 class="h3 fw-bold mb-1">Account Settings</h1>
          <p class="feed-subtitle mb-0">
            Manage your profile information and preferences.
          </p>
        </header>

        <p
          id="settings-status"
          class="compose-status mb-3"
          aria-live="polite"
        ></p>

        <!-- Profile Information Section -->
        <section
          class="compose-card p-3 p-md-4 mb-4"
          aria-labelledby="profile-heading"
        >
          <h2 id="profile-heading" class="h4 mb-3">Profile Information</h2>

          <form id="profile-form">
            <div class="mb-3">
              <label class="compose-label" for="profile-username"
                >Username</label
              >
              <input
                class="compose-input"
                id="profile-username"
                name="username"
                type="text"
                minlength="3"
                maxlength="50"
                required
              />
            </div>

            <div class="mb-3">
              <label class="compose-label" for="profile-email"
                >Email (optional)</label
              >
              <input
                class="compose-input"
                id="profile-email"
                name="email"
                type="email"
                autocomplete="email"
              />
            </div>

            <div class="form-check mb-3">
              <input
                class="form-check-input"
                type="checkbox"
                id="profile-show-email"
                name="show_email"
              />
              <label class="form-check-label" for="profile-show-email"
                >Show email on my profile</label
              >
            </div>

            <button
              class="btn btn-info rounded-pill px-4 fw-semibold"
              type="submit"
            >
              Update Profile
            </button>
          </form>
        </section>

        <!-- Change Password Section -->
        <section
          class="compose-card p-3 p-md-4 mb-4"
          aria-labelledby="password-heading"
        >
          <h2 id="password-heading" class="h4 mb-3">Change Password</h2>

          <form id="password-form">
            <div class="mb-3">
              <label class="compose-label" for="current-password"
                >Current Password</label
              >
              <input
                class="compose-input"
                id="current-password"
                name="current_password"
                type="password"
                autocomplete="current-password"
                required
              />
            </div>

            <div class="mb-3">
              <label class="compose-label" for="new-password"
                >New Password</label
              >
              <input
                class="compose-input"
                id="new-password"
                name="new_password"
                type="password"
                minlength="6"
                autocomplete="new-password"
                required
              />
            </div>

            <div class="mb-3">
              <label class="compose-label" for="confirm-password"
                >Confirm New Password</label
              >
              <input
                class="compose-input"
                id="confirm-password"
                name="confirm_password"
                type="password"
                minlength="6"
                autocomplete="new-password"
                required
              />
            </div>

            <button
              class="btn btn-info rounded-pill px-4 fw-semibold"
              type="submit"
            >
              Change Password
            </button>
          </form>
        </section>

        <!-- Account Actions -->
        <section
          class="compose-card p-3 p-md-4"
          aria-labelledby="actions-heading"
        >
          <div class="d-flex flex-column gap-2">
            <button
              id="logout-button"
              class="btn btn-outline-danger rounded-pill px-4 fw-semibold"
              type="button"
            >
              Logout
            </button>
          </div>
        </section>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"

      crossorigin="anonymous"
    ></script>
    <script src="js/cosmos.js"></script>
    <script src="js/auth-ui.js"></script>
    <script src="js/settings.js"></script>
  </body>
</html>

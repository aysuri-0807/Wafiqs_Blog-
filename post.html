<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post | Wafiq's Blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="space-stars" aria-hidden="true"></div>

    <nav class="navbar navbar-expand-lg border-bottom sticky-top cosmic-nav">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Wafiq's Postulations</a>
            <a class="btn btn-outline-info rounded-pill px-3 ms-auto" href="index.html">Back To Home</a>
        </div>
    </nav>

    <main class="container py-4 position-relative">
        <div class="feed-shell">

            <!-- Post -->
            <div id="post-status" class="feed-subtitle mb-3">Loading post...</div>
            <div id="post-container" aria-live="polite"></div>

            <!-- Comments -->
            <div id="comments-section" class="d-none">
                <div class="d-flex align-items-center justify-content-between mb-3">
                    <h2 class="h5 fw-bold mb-0">Comments</h2>
                    <a id="add-comment-link" href="#" class="btn btn-info rounded-pill px-3 fw-semibold">Add Comment</a>
                </div>
                <div id="comments-status" class="feed-subtitle mb-2"></div>
                <div id="comments-container" aria-live="polite"></div>
            </div>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="js/post.js"></script>
</body>

</html>
